services:
  lifelens:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifelens-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Use .env value when provided; fallback to local qdrant when running local profile.
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      BACKEND_CORS_ORIGINS: http://localhost:8000

  qdrant:
    image: qdrant/qdrant:v1.15.2
    container_name: lifelens-qdrant
    profiles:
      - local-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
