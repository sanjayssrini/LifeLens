services:
  lifelens:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifelens-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Local default for easy setup on a new machine.
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      BACKEND_CORS_ORIGINS: http://localhost:8000
    depends_on:
      qdrant:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.15.2
    container_name: lifelens-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  qdrant_data:
